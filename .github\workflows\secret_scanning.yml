name: Enterprise Secret Scanner

on:
  push:
    branches: [ "master", "main", "experimental/v1" ]
  pull_request:
    branches: [ "master", "main", "experimental/v1" ]
  schedule:
    - cron: '0 0 * * *' # Daily baseline scan

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Deep scan all history
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
